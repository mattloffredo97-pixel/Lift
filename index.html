<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Essentials 4x</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
  :root{
    --bg:#0B0B0E;--surface:#141416;--surface2:#0F0F12;--surface3:#1C1C22;
    --border:#2E2E35;--border2:#3A3A42;
    --orange:#FF5C1A;--orange-ink:#1A0A00;--orange-bg:#1C1206;--orange-bd:#4A2E0C;
    --volt:#C2FF1F;--volt-ink:#1E2A00;--volt-bg:#11160A;--volt-bd:#2A3A10;
    --t1:#F5F5F7;--t2:#9A9AA2;--t3:#6A6A72;--t4:#4A4A52;
    --anton:'Anton',sans-serif;--grotesk:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
    --r:6px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#000;}
  body{font-family:var(--grotesk);color:var(--t1);}
  #app{max-width:440px;margin:0 auto;background:var(--bg);min-height:100vh;min-height:100dvh;position:relative;padding-bottom:82px;overflow-x:hidden;}
  .pad{padding:0 18px;}
  button{font-family:var(--grotesk);cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:var(--mono);}
  .svi{width:1em;height:1em;vertical-align:-0.15em;flex-shrink:0;display:inline-block;}
  .anton{font-family:var(--anton);text-transform:uppercase;letter-spacing:0.5px;line-height:1;}
  .mono{font-family:var(--mono);}
  .eyebrow{color:var(--t3);font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;}
  .muted{color:var(--t2);}.dim{color:var(--t3);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 6px;font-size:13px;}
  .statusbar .mono{color:var(--t1);}.statusbar .ic{color:var(--t2);letter-spacing:2px;}
  .tabbar{position:fixed;left:0;right:0;bottom:0;max-width:440px;margin:0 auto;background:rgba(11,11,14,0.94);
    backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:40;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t3);font-size:10px;letter-spacing:0.5px;padding:4px 0;}
  .tab .svi{width:22px;height:22px;}
  .tab.on{color:var(--orange);}
  .btn-primary{width:100%;background:var(--orange);color:var(--orange-ink);border-radius:var(--r);padding:15px;
    font-family:var(--anton);text-transform:uppercase;letter-spacing:1.5px;font-size:17px;display:flex;align-items:center;justify-content:center;gap:9px;}
  .btn-primary:active{transform:scale(0.985);}
  .btn-primary.volt{background:var(--volt);color:var(--volt-ink);}
  .btn-ghost{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--t1);border-radius:var(--r);padding:13px;font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .strip{display:flex;gap:7px;}
  .strip .d{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .strip .lbl{font-size:9px;letter-spacing:1px;color:var(--t3);text-transform:uppercase;}
  .strip .cell{width:100%;aspect-ratio:1;max-height:42px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:13px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--t4);}
  .strip .cell.done{background:var(--volt-bg);border-color:var(--volt-bd);color:var(--volt);}
  .strip .cell.today{background:var(--orange);border-color:var(--orange);color:var(--orange-ink);}
  .strip .lbl.today{color:var(--orange);}
  .meter{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;}
  .meter > i{display:block;height:100%;background:var(--volt);border-radius:99px;transition:width .35s ease;}
  .ex-row{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:100%;text-align:left;}
  .ex-name{font-size:14px;color:var(--t1);}
  .ex-target{font-family:var(--mono);font-size:12px;color:var(--t2);white-space:nowrap;}
  .grp{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
  .grp.ss{border-left:3px solid var(--orange);}
  .grp-head{padding:9px 14px 6px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;}
  .grp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;}
  .grp-row:last-child{padding-bottom:11px;}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:4px 18px 2px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{min-width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-family:var(--mono);font-weight:700;font-size:13px;background:var(--surface);border:1px solid var(--border);color:var(--t3);position:relative;}
  .chip.done{background:var(--volt-bg);border-color:var(--volt-bd);color:var(--volt);}
  .chip.cur{background:var(--orange);border-color:var(--orange);color:var(--orange-ink);}
  .chip.skip{opacity:.5;}
  /* set rows (bigger, faster) */
  .setrow{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px;margin-top:9px;}
  .setrow.active{border-color:var(--orange);}
  .setrow.done{background:var(--volt-bg);border-color:var(--volt-bd);}
  .check{width:34px;height:34px;border-radius:var(--r);border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--t4);}
  .check .svi{width:20px;height:20px;}
  .setrow.done .check{background:var(--volt);border-color:var(--volt);color:var(--volt-ink);}
  .slabel{font-family:var(--mono);font-size:11px;color:var(--t3);width:16px;flex-shrink:0;}
  .field{display:flex;align-items:center;background:var(--surface3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;flex:1;}
  .field.done{background:transparent;border-color:transparent;}
  .step{width:30px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:16px;flex-shrink:0;background:rgba(255,255,255,0.03);}
  .step:active{background:var(--orange);color:var(--orange-ink);}
  .setrow.done .step{display:none;}
  .sinput{width:100%;min-width:0;background:transparent;border:none;padding:9px 2px;color:var(--t1);
    font-family:var(--mono);font-size:20px;text-align:center;}
  .sinput:focus{outline:none;}
  .sinput::placeholder{color:var(--t4);}
  .setrow.done .sinput{font-family:var(--anton);font-size:22px;}
  .sx{color:var(--t3);font-family:var(--mono);font-size:13px;flex-shrink:0;}
  .repeat{width:30px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--t3);flex-shrink:0;}
  .repeat:active{color:var(--orange);}
  .ssbanner{display:flex;align-items:center;gap:8px;background:var(--orange-bg);border:1px solid var(--orange-bd);border-radius:var(--r);padding:9px 12px;margin-top:11px;}
  .ssbanner .svi{color:var(--orange);}
  .upnext{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-top:10px;}
  .swap-opt{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:#C8C8CE;font-size:13px;margin-top:6px;display:flex;align-items:center;gap:7px;width:100%;text-align:left;}
  .swap-opt.sel{background:var(--orange-bg);border-color:var(--orange);color:var(--orange);font-weight:500;}
  .dropdown-toggle{width:100%;margin-top:11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;justify-content:space-between;color:var(--t1);font-size:13px;font-weight:500;}
  .dropdown-toggle > span{display:flex;align-items:center;gap:7px;}
  .restbar{display:flex;align-items:center;gap:13px;background:var(--orange-bg);border:1px solid var(--orange-bd);border-radius:var(--r);padding:11px 14px;margin-top:12px;}
  .ring{width:40px;height:40px;flex-shrink:0;transform:rotate(-90deg);}
  .ring circle{fill:none;stroke-width:4;}
  .ring .bg{stroke:var(--orange-bd);}.ring .fg{stroke:var(--orange);stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
  .note{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-top:10px;font-size:13px;color:var(--t2);line-height:1.5;}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:13px;padding:6px 11px;border-radius:var(--r);}
  .pill.warm{background:var(--surface2);color:var(--t1);}
  .lasttime{display:flex;align-items:center;gap:7px;background:var(--surface2);border-radius:var(--r);padding:9px 12px;margin-top:10px;font-family:var(--mono);font-size:14px;color:var(--t1);}
  .lasttime .svi{color:var(--t3);}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--volt);color:var(--volt-ink);font-weight:500;font-size:14px;padding:11px 18px;border-radius:var(--r);z-index:60;max-width:90%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .empty{text-align:center;color:var(--t3);padding:40px 20px;}
  .empty .svi{width:34px;height:34px;color:var(--t4);display:block;margin:0 auto 12px;}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
  .tile .big{font-family:var(--anton);font-size:26px;color:var(--t1);}
  .tile .lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-top:3px;}
  .seg{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .seg::-webkit-scrollbar{display:none;}
  .segbtn{white-space:nowrap;padding:7px 12px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);color:var(--t2);font-size:12px;font-weight:500;flex-shrink:0;}
  .segbtn.on{background:var(--orange-bg);border-color:var(--orange);color:var(--orange);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;width:100%;max-width:380px;}
  .modal textarea{width:100%;height:120px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-family:var(--mono);font-size:12px;padding:10px;margin-top:10px;resize:none;}
  .modal textarea:focus{outline:none;border-color:var(--orange);}
  .fadein{animation:fade .22s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  a{color:var(--orange);}
</style>

/* ---------- persistence (on-device) ---------- */
let DB=null; const mem={};
async function rawGet(k){ try{const v=localStorage.getItem(k); if(v!=null) return v;}catch(e){} return mem[k]!=null?mem[k]:null; }
async function rawSet(k,v){ try{localStorage.setItem(k,v);return;}catch(e){mem[k]=v;} }
function freshDB(){ return {logs:{}, settings:{units:'lb',timer:true,wtStep:5}}; }
async function loadDB(){
  const raw=await rawGet(KEY);
  if(raw){ try{DB=JSON.parse(raw);}catch(e){DB=freshDB();} } else DB=freshDB();
  if(!DB.settings) DB.settings={};
  if(DB.settings.units==null) DB.settings.units='lb';
  if(DB.settings.timer==null) DB.settings.timer=true;
  if(DB.settings.wtStep==null) DB.settings.wtStep=5;
  if(!DB.logs) DB.logs={};
}
let saveTimer=null;
function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>rawSet(KEY,JSON.stringify(DB)),120); }

/* ---------- program helpers ---------- */
const sk=(w,d)=>`w${w}d${d}`;
function dayObj(w,d){ const wk=PROGRAM.weeks[w-1]; return wk?wk.days[d]:null; }
function allDays(){ const a=[]; for(let w=1;w<=12;w++) for(let d=0;d<4;d++) a.push({w,d}); return a; }
function nextSession(){ for(const {w,d} of allDays()){ const l=DB.logs[sk(w,d)]; if(!l||(!l.completedAt&&!l.skipped)) return {w,d}; } return null; }
function muscleOf(w,d,i){ return MUSCLE[dayObj(w,d).exercises[i].name]||'Other'; }
function resolvedName(w,d,i){ const l=DB.logs[sk(w,d)]; const s=l&&l.ex&&l.ex[i]?l.ex[i].swap:null; return s||dayObj(w,d).exercises[i].name; }
function ensureLog(w,d){
  const k=sk(w,d);
  if(!DB.logs[k]) DB.logs[k]={w,d,type:dayObj(w,d).type,createdAt:Date.now(),startedAt:null,completedAt:null,date:null,skipped:false,ex:{}};
  DB.logs[k].skipped=false;
  return DB.logs[k];
}
function exState(w,d,i){
  const l=ensureLog(w,d);
  if(!l.ex[i]) l.ex[i]={swap:null,skipped:false,sets:[]};
  if(l.ex[i].skipped==null) l.ex[i].skipped=false;
  const want=dayObj(w,d).exercises[i].sets;
  while(l.ex[i].sets.length<want) l.ex[i].sets.push({wt:'',reps:'',done:false});
  if(l.ex[i].sets.length>want) l.ex[i].sets.length=want;
  return l.ex[i];
}
function exSkipped(w,d,i){ const l=DB.logs[sk(w,d)]; return !!(l&&l.ex[i]&&l.ex[i].skipped); }
function exDone(w,d,i){
  const l=DB.logs[sk(w,d)]; if(!l||!l.ex[i]) return false;
  if(l.ex[i].skipped) return false;
  const want=dayObj(w,d).exercises[i].sets; const s=l.ex[i].sets;
  return s.length>=want && s.slice(0,want).every(x=>x.done);
}
function exTouched(w,d,i){ const l=DB.logs[sk(w,d)]; return !!(l&&l.ex[i]&&(l.ex[i].skipped||l.ex[i].sets.some(x=>x.done))); }
function sessionDoneCount(w,d){ const o=dayObj(w,d); let n=0; for(let i=0;i<o.exercises.length;i++) if(exDone(w,d,i)||exSkipped(w,d,i)) n++; return n; }
function sessionComplete(w,d){ const o=dayObj(w,d); for(let i=0;i<o.exercises.length;i++){ if(!exDone(w,d,i)&&!exSkipped(w,d,i)) return false; } return true; }
function totalSets(o){ return o.exercises.reduce((a,e)=>a+e.sets,0); }
function parseRest(r){ if(!r) return 0; if(/0\s*min/.test(r)) return 0; const m=r.match(/([\d.]+)\s*min/); return m?Math.round(parseFloat(m[1])*60):0; }
function nextUnfinished(w,d,from){ const o=dayObj(w,d); for(let i=from+1;i<o.exercises.length;i++){ if(!exDone(w,d,i)&&!exSkipped(w,d,i)) return i; } return -1; }
function firstUnfinished(w,d){ const o=dayObj(w,d); for(let i=0;i<o.exercises.length;i++){ if(!exDone(w,d,i)&&!exSkipped(w,d,i)) return i; } return 0; }
function lastTimeSets(name,exceptKey){
  const done=Object.values(DB.logs).filter(l=>l.completedAt&&sk(l.w,l.d)!==exceptKey).sort((a,b)=>b.completedAt-a.completedAt);
  for(const l of done){ const o=dayObj(l.w,l.d); if(!o) continue;
    for(let i=0;i<o.exercises.length;i++){ const rn=(l.ex[i]&&l.ex[i].swap)||o.exercises[i].name;
      if(rn===name&&l.ex[i]){ const s=l.ex[i].sets.filter(x=>x.done&&x.wt!==''); if(s.length) return s.map(x=>({wt:x.wt,reps:x.reps})); } } }
  return null;
}
function est1RM(wt,reps){ wt=parseFloat(wt); reps=parseInt(reps); if(!wt||!reps) return 0; return wt*(1+reps/30); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function fmtDur(ms){ if(!ms||ms<0) return '—'; const s=Math.round(ms/1000); const m=Math.floor(s/60); if(m>240) return '—'; const h=Math.floor(m/60); return h>0?`${h}h ${m%60}m`:`${m}m`; }

/* ---------- UI state ---------- */
const UI={screen:'today',view:null,ai:0,swapOpen:false,otherOpen:false,importOpen:false,recap:null,progLift:null};
let restState=null,restInterval=null,sessTimerInt=null;

function statusbar(){ const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  return `<div class="statusbar"><span class="mono">${t}</span><span class="ic">${ic('antenna-bars-5')} ${ic('wifi')} ${ic('battery-3')}</span></div>`; }

/* ---------- TODAY ---------- */
function isComplete(){ return nextSession()===null; }
function weekStrip(){
  const today=new Date(); today.setHours(0,0,0,0); const byDate={};
  Object.values(DB.logs).forEach(l=>{ if(l.completedAt){ const d=new Date(l.completedAt); d.setHours(0,0,0,0); byDate[+d]=l.type[0]; } });
  let cells='';
  for(let off=6;off>=0;off--){ const d=new Date(today); d.setDate(d.getDate()-off);
    const isToday=off===0; const mark=byDate[+d]; const wd=d.toLocaleDateString(undefined,{weekday:'short'})[0];
    let cls='cell',inner='·';
    if(mark){ cls+=' done'; inner=mark; }
    if(isToday){ cls+=' today'; if(!mark){ const ns=nextSession(); inner=ns?dayObj(ns.w,ns.d).type[0]:ic('flag'); } }
    cells+=`<div class="d"><div class="lbl ${isToday?'today':''}">${wd}</div><div class="${cls}">${inner}</div></div>`; }
  return `<div class="strip">${cells}</div>`;
}
function screenToday(){
  const ns=nextSession();
  const totalDone=Object.values(DB.logs).filter(l=>l.completedAt).length;
  let hero;
  if(!ns){
    hero=`<div class="card fadein" style="padding:22px;text-align:center;">
      <div style="color:var(--volt);font-size:40px;">${ic('trophy')}</div>
      <div class="anton" style="font-size:26px;margin-top:8px;">Cycle complete</div>
      <div class="muted" style="font-size:14px;margin-top:6px;line-height:1.5;">Every session logged or skipped. Outstanding. Review it all in Progress, or start a fresh cycle.</div>
      <button class="btn-ghost" style="margin-top:16px;" data-act="restart">${ic('refresh')} Start a new cycle</button></div>`;
  } else {
    const o=dayObj(ns.w,ns.d); const done=sessionDoneCount(ns.w,ns.d); const started=DB.logs[sk(ns.w,ns.d)]&&done>0;
    hero=`<div class="card fadein" style="padding:18px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="eyebrow" style="color:var(--orange);">${started?'Resume':'Next up'}</span>
        <span class="mono dim" style="font-size:11px;">W${ns.w} · D${ns.d+1}</span></div>
      <div class="anton" style="font-size:30px;margin-top:8px;">${o.type} · Day ${ns.d+1}</div>
      <div class="mono muted" style="font-size:12px;margin-top:7px;">${o.exercises.length} EXERCISES · ${totalSets(o)} SETS</div>
      ${started?`<div class="meter" style="margin-top:14px;"><i style="width:${Math.round(done/o.exercises.length*100)}%"></i></div>
        <div class="mono dim" style="font-size:11px;margin-top:6px;">${done}/${o.exercises.length} done</div>`:''}
      <button class="btn-primary" style="margin-top:16px;" data-act="beginNext">${ic('player-play')} ${started?'Resume session':'Start session'}</button>
      <div style="text-align:center;margin-top:11px;"><span class="dim" style="font-size:12px;" data-act="tab" data-tab="program">${ic('calendar')} Pick a different day</span></div></div>`;
  }
  const progWeek=ns?ns.w:12;
  const progPct=Math.round(Object.values(DB.logs).filter(l=>l.completedAt).length/48*100);
  return `${statusbar()}
    <div class="pad" style="display:flex;justify-content:space-between;align-items:center;padding-top:6px;">
      <div class="anton" style="font-size:20px;color:var(--orange);">Essentials 4x</div>
      <div class="mono dim" style="font-size:12px;">WEEK ${progWeek}/12</div></div>
    <div class="pad" style="margin-top:6px;"><div class="meter"><i style="width:${progPct}%;background:var(--orange)"></i></div></div>
    <div class="pad" style="margin-top:18px;">${hero}</div>
    <div class="pad" style="margin-top:22px;"><div class="eyebrow" style="margin-bottom:11px;">Last 7 days</div>${weekStrip()}
      <div class="dim" style="font-size:11px;margin-top:9px;line-height:1.5;">Advances by sessions you finish, not the calendar. Do days in any order from Program.</div></div>
    ${recentList()}`;
}
function recentList(){
  const done=Object.values(DB.logs).filter(l=>l.completedAt).sort((a,b)=>b.completedAt-a.completedAt).slice(0,3);
  if(!done.length) return '';
  const rows=done.map(l=>`<button class="ex-row" style="margin-top:8px;" data-act="view" data-w="${l.w}" data-d="${l.d}">
      <div><div class="ex-name">${l.type} · Day ${l.d+1} <span class="dim" style="font-size:12px;">· W${l.w}</span></div>
      <div class="mono dim" style="font-size:11px;margin-top:3px;">${fmtDate(l.completedAt)} · ${sessionDoneCount(l.w,l.d)} logged</div></div>
      ${ic('chevron-right')}</button>`).join('');
  return `<div class="pad" style="margin-top:22px;"><div class="eyebrow" style="margin-bottom:4px;">Recent</div>${rows}</div>`;
}

/* ---------- OVERVIEW ---------- */
function screenOverview(){
  const {w,d}=UI.view; const o=dayObj(w,d);
  const log=DB.logs[sk(w,d)]; const completed=log&&log.completedAt; const started=log&&sessionDoneCount(w,d)>0;
  let html=''; const ex=o.exercises; let i=0;
  while(i<ex.length){ const e=ex[i];
    if(e.ss){ const g=e.ss; let rows='';
      while(i<ex.length&&ex[i].ss===g){ const x=ex[i]; rows+=`<div class="grp-row"><span class="ex-name">${x.ss}${x.ssPos} · ${esc(x.name)}</span><span class="ex-target">${x.sets} × ${esc(x.target)}</span></div>`; i++; }
      html+=`<div class="grp ss" style="margin-top:9px;"><div class="grp-head" style="color:var(--orange);">${ic('arrows-shuffle')} Superset ${g}</div>${rows}</div>`;
    } else { const base=e.name.replace(/\s*\(.*\)\s*/,'').trim(); const next=ex[i+1];
      if(next&&!next.ss&&next.name.replace(/\s*\(.*\)\s*/,'').trim()===base&&/\(/.test(e.name)){ let rows='';
        while(i<ex.length&&ex[i].name.replace(/\s*\(.*\)\s*/,'').trim()===base&&/\(/.test(ex[i].name)){ const x=ex[i]; const tag=(x.name.match(/\(([^)]+)\)/)||[])[1]||x.name; rows+=`<div class="grp-row"><span class="ex-name">${esc(tag)}</span><span class="ex-target">${x.sets} × ${esc(x.target)}</span></div>`; i++; }
        html+=`<div class="grp" style="margin-top:9px;"><div class="grp-head dim">${esc(base.toUpperCase())}</div>${rows}</div>`;
      } else { html+=`<div class="ex-row" style="margin-top:9px;"><span class="ex-name">${esc(e.name)}</span><span class="ex-target">${e.sets} × ${esc(e.target)}</span></div>`; i++; } }
  }
  const cta = completed
    ? `<button class="btn-ghost" data-act="open">${ic('pencil')} Review / edit this session</button>`
    : `<button class="btn-primary" data-act="open">${ic('player-play')} ${started?'Resume session':'Start session'}</button>`;
  return `${statusbar()}
    <div class="pad" style="display:flex;align-items:center;gap:12px;padding-top:6px;">
      <button data-act="back" style="font-size:22px;color:var(--t2);">${ic('chevron-left')}</button>
      <div><div class="eyebrow" style="color:var(--orange);">Week ${w} · session ${d+1}${completed?' · done':''}</div>
      <div class="anton" style="font-size:24px;margin-top:2px;">${o.type} · Day ${d+1}</div></div></div>
    <div class="pad" style="margin-top:6px;"><div class="mono dim" style="font-size:12px;">${o.exercises.length} EXERCISES · ${totalSets(o)} SETS</div></div>
    <div class="pad" style="margin-top:14px;">${html}</div>
    <div class="pad" style="margin-top:20px;display:flex;flex-direction:column;gap:9px;">${cta}
      ${!completed?`<button class="btn-ghost" data-act="skipday" style="color:var(--t2);">${ic('player-skip-forward')} Skip this day</button>`:''}</div>`;
}

/* ---------- LOGGING ---------- */
function screenLog(){
  const {w,d}=UI.view; const o=dayObj(w,d); const i=UI.ai; const e=o.exercises[i];
  const st=exState(w,d,i); const name=resolvedName(w,d,i); const last=lastTimeSets(name,sk(w,d));
  const units=DB.settings.units; const skipped=st.skipped;
  let chips='';
  for(let k=0;k<o.exercises.length;k++){ let cls='chip'; if(k===i) cls+=' cur'; else if(exDone(w,d,k)) cls+=' done'; if(exSkipped(w,d,k)) cls+=' skip';
    const inner=exSkipped(w,d,k)?ic('player-skip-forward'):(exDone(w,d,k)&&k!==i?ic('check'):(k+1));
    chips+=`<button class="${cls}" data-act="goto" data-i="${k}">${inner}</button>`; }
  // superset partner
  let ssBanner='';
  if(e.ss){ let partner=''; o.exercises.forEach((x,xi)=>{ if(x.ss===e.ss&&xi!==i) partner=resolvedName(w,d,xi); });
    ssBanner=`<div class="ssbanner">${ic('arrows-shuffle')}<span style="font-size:13px;"><b class="mono" style="color:var(--orange);">SUPERSET ${e.ss}</b> · alternate with ${esc(partner)}</span></div>`; }
  // set rows
  let rows='';
  for(let s=0;s<e.sets;s++){ const v=st.sets[s]; const cls='setrow'+(v.done?' done':(allPrevDone(st,s)?' active':''));
    const ph=last&&last[s]?last[s]:(last&&last.length?last[last.length-1]:null);
    rows+=`<div class="${cls}" data-set="${s}">
      <button class="check" data-act="toggleset" data-i="${i}" data-s="${s}">${v.done?ic('check'):''}</button>
      <span class="slabel">${s+1}</span>
      <div class="field ${v.done?'done':''}">
        ${v.done?'':`<button class="step" data-act="step" data-fld="wt" data-i="${i}" data-s="${s}" data-dir="-1">${ic('minus')}</button>`}
        <input class="sinput" data-fld="wt" data-i="${i}" data-s="${s}" inputmode="decimal" placeholder="${ph?ph.wt:(units==='lb'?'lb':'kg')}" value="${v.wt!==''?v.wt:''}">
        ${v.done?'':`<button class="step" data-act="step" data-fld="wt" data-i="${i}" data-s="${s}" data-dir="1">${ic('plus')}</button>`}
      </div>
      <span class="sx">×</span>
      <div class="field ${v.done?'done':''}">
        ${v.done?'':`<button class="step" data-act="step" data-fld="reps" data-i="${i}" data-s="${s}" data-dir="-1">${ic('minus')}</button>`}
        <input class="sinput" data-fld="reps" data-i="${i}" data-s="${s}" inputmode="numeric" placeholder="${ph?ph.reps:'reps'}" value="${v.reps!==''?v.reps:''}">
        ${v.done?'':`<button class="step" data-act="step" data-fld="reps" data-i="${i}" data-s="${s}" data-dir="1">${ic('plus')}</button>`}
      </div>
      ${v.done?`<span class="repeat" style="color:var(--volt);">${ic('check')}</span>`:`<button class="repeat" data-act="repeat" data-i="${i}" data-s="${s}" title="Copy ${s>0?'set above':'last time'}">${ic('copy')}</button>`}
    </div>`; }
  // swap

        ${ssBanner}

        ${last?`<div class="lasttime">${ic('history')} <span class="dim" style="font-size:11px;letter-spacing:1px;">LAST</span> ${last.map(x=>`${x.wt}×${x.reps}`).join('  ·  ')}</div>`:`<div class="lasttime" style="color:var(--t3);">${ic('history')} First time logging this</div>`}

function allPrevDone(st,s){ for(let k=0;k<s;k++) if(!st.sets[k].done) return false; return true; }

/* ---------- RECAP ---------- */
function buildRecap(w,d){
  const o=dayObj(w,d); const l=DB.logs[sk(w,d)];
  let sets=0,vol=0,exDoneN=0,skips=0; const prs=[];
  for(let i=0;i<o.exercises.length;i++){
    if(exSkipped(w,d,i)){ skips++; continue; }
    const st=l.ex[i]; if(!st) continue; let did=false; let best=0;
    st.sets.forEach(x=>{ if(x.done&&x.wt!==''){ sets++; vol+=parseFloat(x.wt||0)*parseInt(x.reps||0); did=true; best=Math.max(best,est1RM(x.wt,x.reps)); } });
    if(did) exDoneN++;
    // PR vs previous occurrence
    const name=resolvedName(w,d,i); const prev=lastTimeSets(name,sk(w,d));
    if(best>0&&prev){ const prevBest=Math.max(...prev.map(x=>est1RM(x.wt,x.reps))); if(best>prevBest+0.01) prs.push({name,e1:Math.round(best)}); }
  }
  const dur=(l.startedAt&&l.completedAt)?l.completedAt-l.startedAt:0;
  return {w,d,type:o.type,dur,sets,vol:Math.round(vol),exDoneN,total:o.exercises.length,skips,prs};
}
function screenRecap(){
  const r=UI.recap; if(!r) return screenToday();
  const prRows=r.prs.length?r.prs.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--border);"><span style="font-size:13px;">${esc(p.name)}</span><span class="mono" style="color:var(--volt);font-size:13px;">~${p.e1} est 1RM</span></div>`).join(''):'';
  return `${statusbar()}
    <div class="pad" style="padding-top:20px;text-align:center;">
      <div style="color:var(--volt);font-size:38px;">${ic('flag-check')}</div>

      <div class="tile"><div class="big">${fmtDur(r.dur)}</div><div class="lbl">Duration</div></div>

    ${r.prs.length?`<div class="pad" style="margin-top:20px;"><div class="card" style="padding:14px 16px;"><div class="eyebrow" style="color:var(--volt);margin-bottom:2px;">${ic('trending-up')} New bests vs last time</div>${prRows}</div></div>`:''}

/* ---------- PROGRESS ---------- */
function completedLogs(){ return Object.values(DB.logs).filter(l=>l.completedAt).sort((a,b)=>(a.w-b.w)||(a.d-b.d)); }
function weeklySets(){ const map={}; completedLogs().forEach(l=>{ const o=dayObj(l.w,l.d); let n=0; for(let i=0;i<o.exercises.length;i++){ if(l.ex[i]) n+=l.ex[i].sets.filter(x=>x.done).length; } map[l.w]=(map[l.w]||0)+n; }); return map; }
function muscleSets(){ const map={}; completedLogs().forEach(l=>{ const o=dayObj(l.w,l.d); for(let i=0;i<o.exercises.length;i++){ if(!l.ex[i]) continue; const c=l.ex[i].sets.filter(x=>x.done).length; if(!c) continue; const m=muscleOf(l.w,l.d,i); map[m]=(map[m]||0)+c; } }); return map; }
function liftHistory(name){ const pts=[]; completedLogs().forEach(l=>{ const o=dayObj(l.w,l.d); for(let i=0;i<o.exercises.length;i++){ const rn=(l.ex[i]&&l.ex[i].swap)||o.exercises[i].name; if(rn===name&&l.ex[i]){ let best=0; l.ex[i].sets.forEach(x=>{ if(x.done) best=Math.max(best,est1RM(x.wt,x.reps)); }); if(best>0) pts.push({label:`W${l.w}`,value:Math.round(best),ts:l.completedAt}); } } }); return pts; }
function liftsWithData(){ const set=new Set(); completedLogs().forEach(l=>{ const o=dayObj(l.w,l.d); for(let i=0;i<o.exercises.length;i++){ const rn=(l.ex[i]&&l.ex[i].swap)||o.exercises[i].name; if(l.ex[i]&&l.ex[i].sets.some(x=>x.done&&x.wt!=='' &&parseFloat(x.wt)>0)) set.add(rn); } }); return [...set]; }

function barV(map,color){ const keys=Object.keys(map); if(!keys.length) return ''; const vals=keys.map(k=>map[k]); const max=Math.max(...vals,1);
  const W=keys.length*46, H=120; let bars=''; keys.forEach((k,idx)=>{ const h=Math.round((map[k]/max)*90); const x=idx*46+10;
    bars+=`<rect x="${x}" y="${110-h}" width="26" height="${h}" rx="3" fill="${color}"/><text x="${x+13}" y="122" fill="var(--t3)" font-size="10" text-anchor="middle" font-family="var(--mono)">${k}</text><text x="${x+13}" y="${104-h}" fill="var(--t1)" font-size="11" text-anchor="middle" font-family="var(--mono)">${map[k]}</text>`; });
  return `<svg viewBox="0 0 ${Math.max(W,60)} 128" width="100%" style="max-width:${Math.max(W,60)}px;">${bars}</svg>`; }
function barH(map){ const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]); if(!entries.length) return ''; const max=Math.max(...entries.map(e=>e[1]),1);
  return entries.map(([k,v])=>`<div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
    <span style="width:78px;font-size:12px;color:var(--t2);text-align:right;flex-shrink:0;">${k}</span>
    <div style="flex:1;height:20px;background:var(--surface3);border-radius:4px;overflow:hidden;"><div style="width:${Math.round(v/max*100)}%;height:100%;background:var(--orange);"></div></div>
    <span class="mono" style="width:24px;font-size:13px;color:var(--t1);">${v}</span></div>`).join(''); }
function lineChart(pts){ if(pts.length<2) return `<div class="dim" style="font-size:12px;padding:20px 0;text-align:center;">Log this lift at least twice to see a trend.</div>`;
  const W=300,H=140,pad=30; const vals=pts.map(p=>p.value); const min=Math.min(...vals),max=Math.max(...vals); const rng=(max-min)||1;
  const X=idx=>pad+idx*((W-pad-10)/(pts.length-1)); const Y=v=>H-24-((v-min)/rng)*(H-40);
  let path='',dots='',labels='';
  pts.forEach((p,idx)=>{ const x=X(idx),y=Y(p.value); path+=(idx?'L':'M')+x+' '+y+' '; dots+=`<circle cx="${x}" cy="${y}" r="3.5" fill="var(--volt)"/><text x="${x}" y="${y-9}" fill="var(--t1)" font-size="10" text-anchor="middle" font-family="var(--mono)">${p.value}</text>`; labels+=`<text x="${x}" y="${H-6}" fill="var(--t3)" font-size="10" text-anchor="middle" font-family="var(--mono)">${p.label}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${path?`<path d="${path}" fill="none" stroke="var(--orange)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`:''}${dots}${labels}</svg>`; }

function screenProgress(){

  const totalVol=logs.reduce((a,l)=>{ const o=dayObj(l.w,l.d); let v=0; for(let i=0;i<o.exercises.length;i++) if(l.ex[i]) l.ex[i].sets.forEach(x=>{ if(x.done) v+=parseFloat(x.wt||0)*parseInt(x.reps||0); }); return a+v; },0);
  const lifts=liftsWithData(); if(!UI.progLift||!lifts.includes(UI.progLift)) UI.progLift=lifts[0]||null;

  return `${statusbar()}

      <div class="tile" style="padding:12px;"><div class="big" style="font-size:22px;">${logs.length}</div><div class="lbl">Sessions</div></div>
      <div class="tile" style="padding:12px;"><div class="big" style="font-size:22px;">${totalSets}</div><div class="lbl">Hard sets</div></div>

    <div class="pad" style="margin-top:22px;"><div class="eyebrow" style="margin-bottom:4px;">Est. 1RM trend</div>
      <div class="dim" style="font-size:11px;margin-bottom:10px;">Your top set each session, Epley formula.</div>
      <div class="seg">${seg}</div>
      <div class="card" style="padding:14px 10px;margin-top:10px;">${lineChart(pts)}</div></div>
    <div class="pad" style="margin-top:24px;"><div class="eyebrow" style="margin-bottom:4px;">Weekly hard sets</div>
      <div class="dim" style="font-size:11px;margin-bottom:8px;">Total working sets per week — are you holding volume through the cut?</div>
      <div class="card" style="padding:12px;overflow-x:auto;">${barV(weeklySets(),'var(--orange)')}</div></div>
    <div class="pad" style="margin-top:24px;margin-bottom:10px;"><div class="eyebrow" style="margin-bottom:4px;">Sets per muscle group</div>
      <div class="dim" style="font-size:11px;margin-bottom:8px;">This cycle so far. Jeff's landmark is roughly 10–20 hard sets per muscle per week.</div>
      <div class="card" style="padding:14px;">${barH(muscleSets())}</div></div>`;
}

  m.innerHTML=`<div class="restbar"><svg class="ring" viewBox="0 0 44 44"><circle class="bg" cx="22" cy="22" r="18"></circle><circle class="fg" id="restFg" cx="22" cy="22" r="18" stroke-dasharray="${C}" stroke-dashoffset="0"></circle></svg>
    <div><div class="eyebrow" style="color:var(--orange);">Resting</div><div class="anton" id="restNum" style="font-size:20px;margin-top:2px;">0:00</div></div>
    <div style="flex:1"></div><button class="swap-opt" style="margin:0;width:auto;background:transparent;border-color:var(--orange-bd);" data-act="restskip">Skip ${ic('player-skip-forward')}</button></div>`;
  paintRest(); }
function paintRest(){ if(!restState) return; const num=document.getElementById('restNum'),fg=document.getElementById('restFg');
  const left=Math.max(0,Math.round((restState.end-Date.now())/1000));
  if(num) num.textContent=`${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}`;
  if(fg){ const C=2*Math.PI*18; fg.style.strokeDashoffset=C*(1-left/restState.total); }
  if(left<=0) stopRest(true); }
function startRest(sec){ if(!DB.settings.timer||sec<=0) return; restState={end:Date.now()+sec*1000,total:sec}; mountRest(); clearInterval(restInterval); restInterval=setInterval(paintRest,250); }
function stopRest(buzz){ clearInterval(restInterval); restInterval=null; restState=null; if(buzz&&navigator.vibrate) try{navigator.vibrate(180);}catch(e){} const m=document.getElementById('restMount'); if(m) m.innerHTML=''; }

/* ---------- toast ---------- */
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); },2200); }

/* ---------- input sync + auto-check ---------- */
function syncInputs(){ if(UI.screen!=='log') return; const {w,d}=UI.view; const l=DB.logs[sk(w,d)]; if(!l||!l.ex[UI.ai]) return; const st=l.ex[UI.ai];
  document.querySelectorAll('#app .sinput[data-fld]').forEach(inp=>{ const s=+inp.dataset.s; if(st.sets[s]) st.sets[s][inp.dataset.fld]=inp.value.trim(); });
  st.sets.forEach(x=>{ if(!x.done && x.wt!=='' && x.reps!=='') x.done=true; }); }
function markStart(l){ if(!l.startedAt) l.startedAt=Date.now(); }
function autoCheck(w,d,i,s,rest){ const st=exState(w,d,i); const v=st.sets[s]; if(v.wt!==''&&v.reps!==''&&!v.done){ v.done=true; markStart(DB.logs[sk(w,d)]); if(rest) startRest(parseRest(dayObj(w,d).exercises[i].rest)); return true; } return false; }

/* ---------- events ---------- */
document.addEventListener('input',e=>{ if(e.target.classList.contains('sinput')&&e.target.dataset.fld){ const {w,d}=UI.view; const ex=exState(w,d,UI.ai); const s=+e.target.dataset.s; ex.sets[s][e.target.dataset.fld]=e.target.value.trim(); save(); } });
document.addEventListener('change',e=>{ if(e.target.classList.contains('sinput')&&e.target.dataset.fld){ const {w,d}=UI.view; const i=UI.ai; const s=+e.target.dataset.s; const ex=exState(w,d,i); ex.sets[s][e.target.dataset.fld]=e.target.value.trim(); if(autoCheck(w,d,i,s,true)){ save(); render(); } else save(); } });
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]'); if(!el) return; const act=el.dataset.act;
  const W=UI.view?UI.view.w:null, D=UI.view?UI.view.d:null;
  if(act==='tab'){ UI.screen=el.dataset.tab; UI.view=null; resetEx(); render(); window.scrollTo(0,0); return; }
  if(act==='beginNext'){ const ns=nextSession(); if(!ns) return; UI.view={w:ns.w,d:ns.d}; UI.screen='overview'; render(); window.scrollTo(0,0); return; }
  if(act==='view'){ UI.view={w:+el.dataset.w,d:+el.dataset.d}; UI.screen='overview'; render(); window.scrollTo(0,0); return; }
  if(act==='open'){ ensureLog(UI.view.w,UI.view.d); UI.ai=firstUnfinished(UI.view.w,UI.view.d); UI.screen='log'; resetEx(); render(); window.scrollTo(0,0); return; }
  if(act==='back'){ UI.screen=(UI.screen==='log')?'overview':'today'; render(); window.scrollTo(0,0); return; }
  if(act==='skipday'){ if(confirm('Skip this whole day? It will not count in your charts. You can come back to it later.')){ const l=ensureLog(UI.view.w,UI.view.d); l.skipped=true; l.completedAt=null; save(); UI.screen='today'; UI.view=null; render(); toast('Day skipped'); } return; }

  if(act==='goto'){ syncInputs(); save(); UI.ai=+el.dataset.i; resetEx(); stopRest(); render(); window.scrollTo(0,0); return; }
  if(act==='toggleset'){ const i=+el.dataset.i,s=+el.dataset.s; syncInputs(); const st=exState(W,D,i); const set=st.sets[s]; set.done=!set.done;
    if(set.done){ if(set.wt==='')set.wt='0'; if(set.reps==='')set.reps='0'; markStart(DB.logs[sk(W,D)]); save(); render(); startRest(parseRest(dayObj(W,D).exercises[i].rest)); return; } save(); render(); return; }
  if(act==='step'){ syncInputs(); const i=+el.dataset.i,s=+el.dataset.s,fld=el.dataset.fld,dir=+el.dataset.dir; const st=exState(W,D,i); const cur=parseFloat(st.sets[s][fld]||0); const inc=fld==='wt'?DB.settings.wtStep:1; let nv=cur+dir*inc; if(nv<0)nv=0; st.sets[s][fld]=String(fld==='wt'?nv:Math.round(nv)); save(); render(); return; }
  if(act==='repeat'){ syncInputs(); const i=+el.dataset.i,s=+el.dataset.s; const st=exState(W,D,i); let src=null;
    if(s>0) src={wt:st.sets[s-1].wt,reps:st.sets[s-1].reps}; else { const lt=lastTimeSets(resolvedName(W,D,i),sk(W,D)); if(lt) src=lt[0]; }
    if(src&&src.wt!==''){ st.sets[s].wt=src.wt; st.sets[s].reps=src.reps; autoCheck(W,D,i,s,false); save(); render(); } else toast('Nothing to copy yet'); return; }
  if(act==='skipex'){ syncInputs(); const i=+el.dataset.i; exState(W,D,i).skipped=true; save(); const nx=nextUnfinished(W,D,i); if(nx>=0){UI.ai=nx;resetEx();} render(); window.scrollTo(0,0); return; }
  if(act==='unskip'){ const i=+el.dataset.i; exState(W,D,i).skipped=false; save(); render(); return; }

  if(act==='swaptoggle'){ syncInputs(); UI.swapOpen=!UI.swapOpen; UI.otherOpen=false; render(); return; }
  if(act==='swap'){ const i=+el.dataset.i; const nm=el.dataset.name; const ex=exState(W,D,i); ex.swap=(nm===dayObj(W,D).exercises[i].name)?null:nm; UI.swapOpen=false; save(); render(); return; }
  if(act==='otheropen'){ UI.otherOpen=true; render(); setTimeout(()=>{const x=document.getElementById('otherInput'); if(x)x.focus();},30); return; }
  if(act==='swapother'){ const x=document.getElementById('otherInput'); const v=x?x.value.trim():''; if(v){ exState(W,D,+el.dataset.i).swap=v; UI.swapOpen=false; UI.otherOpen=false; save(); render(); } return; }
  if(act==='restskip'){ stopRest(false); return; }
  if(act==='finish'){ finishSession(); return; }
  if(act==='recapdone'){ UI.recap=null; UI.screen='today'; UI.view=null; render(); window.scrollTo(0,0); return; }
  if(act==='restart'){ if(confirm('Start a fresh 12-week cycle? Your logged history stays saved for reference, but the program resets to Week 1.')){ Object.keys(DB.logs).forEach(k=>{ DB.logs[k]._arch=true; }); DB.logs={}; save(); UI.screen='today'; render(); } return; }

  if(act==='pick-lift'){ UI.progLift=el.dataset.name; render(); return; }
  if(act==='units'){ DB.settings.units=DB.settings.units==='lb'?'kg':'lb'; save(); render(); return; }
  if(act==='wtstep'){ const opts=[2.5,5,10]; DB.settings.wtStep=opts[(opts.indexOf(DB.settings.wtStep)+1)%opts.length]; save(); render(); return; }
  if(act==='toggletimer'){ DB.settings.timer=!DB.settings.timer; save(); render(); return; }
  if(act==='importopen'){ UI.importOpen=true; render(); return; }
  if(act==='importcancel'){ UI.importOpen=false; render(); return; }
  if(act==='importsave'){ const t=document.getElementById('importText'); try{ const p=JSON.parse(t.value); if(!p||typeof p!=='object'||!p.logs) throw 0; DB=p; if(!DB.settings)DB.settings={units:'lb',timer:true,wtStep:5}; if(DB.settings.wtStep==null)DB.settings.wtStep=5; UI.importOpen=false; save(); UI.screen='today'; render(); toast('Backup restored'); }catch(err){ toast('That does not look like a valid backup'); } return; }
  if(act==='export'){ const data=JSON.stringify(DB,null,2); if(navigator.clipboard){ navigator.clipboard.writeText(data).then(()=>toast('Copied your data to clipboard')).catch(()=>fallbackExport(data)); } else fallbackExport(data); return; }
  if(act==='reset'){ if(confirm('Erase ALL logged sets and progress? This cannot be undone.')){ DB=freshDB(); save(); UI.screen='today'; render(); toast('Data reset'); } return; }
});
function fallbackExport(data){ const w=window.open('','_blank'); if(w) w.document.write('<pre>'+data.replace(/</g,'&lt;')+'</pre>'); else toast('Could not open export'); }
function resetEx(){ UI.swapOpen=false; UI.otherOpen=false; }
function finishSession(){
  syncInputs(); const {w,d}=UI.view; const o=dayObj(w,d); const done=sessionDoneCount(w,d);
  if(done<o.exercises.length){ if(!confirm(`You've settled ${done} of ${o.exercises.length} exercises. Finish anyway?`)) return; }
  const l=ensureLog(w,d); const first=!l.completedAt; if(!l.startedAt) l.startedAt=l.createdAt||Date.now();
  l.completedAt=Date.now(); l.date=new Date().toISOString().slice(0,10); save();
  stopRest();
  if(first){ UI.recap=buildRecap(w,d); UI.screen='recap'; } else { UI.screen='overview'; toast('Session updated'); }
  UI.view=first?UI.view:{w,d}; resetEx(); render(); window.scrollTo(0,0);
}

/* ---------- boot ---------- */
(async function(){ await loadDB(); render(); document.addEventListener('visibilitychange',()=>{ if(!document.hidden&&UI.screen==='log') paintRest(); }); })();
</script>
