<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0B0E; --surface:#141416; --surface2:#0F0F12; --surface3:#1C1C22;
    --border:#2E2E35; --border2:#3A3A42;
    --orange:#FF5C1A; --orange-ink:#1A0A00; --orange-bg:#1C1206; --orange-bd:#4A2E0C;
    --volt:#C2FF1F; --volt-ink:#1E2A00; --volt-bg:#11160A; --volt-bd:#2A3A10;
    --t1:#F5F5F7; --t2:#9A9AA2; --t3:#6A6A72; --t4:#4A4A52;
    --anton:'Anton',sans-serif; --grotesk:'Space Grotesk',sans-serif; --mono:'Space Mono',monospace;
    --r:6px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#000;}
  body{font-family:var(--grotesk);color:var(--t1);}
  #app{max-width:440px;margin:0 auto;background:var(--bg);min-height:100vh;min-height:100dvh;position:relative;padding-bottom:78px;overflow-x:hidden;}
  .pad{padding:0 18px;}
  button{font-family:var(--grotesk);cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:var(--mono);}
  .anton{font-family:var(--anton);text-transform:uppercase;letter-spacing:0.5px;line-height:1;}
  .mono{font-family:var(--mono);}
  .eyebrow{color:var(--t3);font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;}
  .muted{color:var(--t2);} .dim{color:var(--t3);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 6px;font-size:13px;}
  .statusbar .mono{color:var(--t1);} .statusbar .ic{color:var(--t2);letter-spacing:2px;}

  /* tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;max-width:440px;margin:0 auto;background:rgba(11,11,14,0.92);
    backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:40;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t3);font-size:10px;letter-spacing:0.5px;padding:4px 0;}
  .tab .svi{width:22px;height:22px;}
  .tab.on{color:var(--orange);}

  /* buttons */
  .btn-primary{width:100%;background:var(--orange);color:var(--orange-ink);border-radius:var(--r);padding:15px;
    font-family:var(--anton);text-transform:uppercase;letter-spacing:1.5px;font-size:17px;display:flex;align-items:center;justify-content:center;gap:9px;}
  .btn-primary:active{transform:scale(0.985);}
  .btn-primary.volt{background:var(--volt);color:var(--volt-ink);}
  .btn-primary.disabled{background:var(--surface3);color:var(--t3);}
  .btn-ghost{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--t1);border-radius:var(--r);padding:13px;font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;}

  /* week strip */
  .strip{display:flex;gap:7px;}
  .strip .d{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .strip .lbl{font-size:9px;letter-spacing:1px;color:var(--t3);text-transform:uppercase;}
  .strip .cell{width:100%;aspect-ratio:1;max-height:42px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:13px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--t4);}
  .strip .cell.done{background:var(--volt-bg);border-color:var(--volt-bd);color:var(--volt);}
  .strip .cell.today{background:var(--orange);border-color:var(--orange);color:var(--orange-ink);}
  .strip .lbl.today{color:var(--orange);}

  /* progress meter */
  .meter{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;}
  .meter > i{display:block;height:100%;background:var(--volt);border-radius:99px;transition:width .35s ease;}

  /* overview list */
  .ex-row{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
  .ex-name{font-size:14px;color:var(--t1);}
  .ex-target{font-family:var(--mono);font-size:12px;color:var(--t2);white-space:nowrap;}
  .grp{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
  .grp.ss{border-left:3px solid var(--orange);}
  .grp-head{padding:9px 14px 6px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;}
  .grp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;}
  .grp-row:last-child{padding-bottom:11px;}

  /* logging */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:4px 18px 2px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{min-width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-family:var(--mono);font-weight:700;font-size:13px;background:var(--surface);border:1px solid var(--border);color:var(--t3);}
  .chip.done{background:var(--volt-bg);border-color:var(--volt-bd);color:var(--volt);}
  .chip.cur{background:var(--orange);border-color:var(--orange);color:var(--orange-ink);}

  .setrow{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;margin-top:8px;}
  .setrow.active{border-color:var(--orange);}
  .setrow.done{background:var(--volt-bg);border-color:var(--volt-bd);}
  .svi{width:1em;height:1em;vertical-align:-0.15em;flex-shrink:0;display:inline-block;}
  .check{width:28px;height:28px;border-radius:var(--r);border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--t4);}
  .check .svi{width:17px;height:17px;}
  .dropdown-toggle{width:100%;margin-top:11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;justify-content:space-between;color:var(--t1);font-size:13px;font-weight:500;}
  .dropdown-toggle > span{display:flex;align-items:center;gap:7px;}
  .setrow.done .check{background:var(--volt);border-color:var(--volt);color:var(--volt-ink);}
  .slabel{font-family:var(--mono);font-size:11px;color:var(--t3);min-width:18px;}
  .sinput{width:62px;background:var(--surface3);border:1px solid var(--border);border-radius:var(--r);padding:8px 6px;color:var(--t1);
    font-family:var(--mono);font-size:15px;text-align:center;}
  .sinput:focus{outline:none;border-color:var(--orange);}
  .sinput::placeholder{color:var(--t3);}
  .setrow.done .sinput{background:transparent;border-color:transparent;color:var(--t1);font-family:var(--anton);font-size:18px;}
  .sx{color:var(--t3);font-family:var(--mono);}
  .sunit{font-size:10px;color:var(--t3);margin-left:-4px;}

  /* swap */
  .swap-opt{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:#C8C8CE;font-size:13px;margin-top:6px;display:flex;align-items:center;gap:7px;}
  .swap-opt.sel{background:var(--orange-bg);border-color:var(--orange);color:var(--orange);font-weight:500;}
  .swap-opt:active{transform:scale(0.99);}

  /* rest bar */
  .restbar{display:flex;align-items:center;gap:13px;background:var(--orange-bg);border:1px solid var(--orange-bd);border-radius:var(--r);padding:11px 14px;margin-top:12px;}
  .ring{width:40px;height:40px;flex-shrink:0;transform:rotate(-90deg);}
  .ring circle{fill:none;stroke-width:4;}
  .ring .bg{stroke:var(--orange-bd);} .ring .fg{stroke:var(--orange);stroke-linecap:round;transition:stroke-dashoffset 1s linear;}

  .note{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-top:10px;font-size:13px;color:var(--t2);line-height:1.5;}
  .pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:var(--r);}
  .pill.warm{background:var(--surface2);color:var(--t2);}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--volt);color:var(--volt-ink);
    font-weight:500;font-size:14px;padding:11px 18px;border-radius:var(--r);z-index:60;max-width:90%;text-align:center;
    box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .empty{text-align:center;color:var(--t3);padding:40px 20px;}

/* ---------- persistence ---------- */
let DB = null;
const mem = {}; // fallback if window.storage unavailable
async function rawGet(k){
  try{ const v=localStorage.getItem(k); if(v!=null) return v; }catch(e){}
  return mem[k]!=null?mem[k]:null;
}
async function rawSet(k,v){
  try{ localStorage.setItem(k,v); return; }catch(e){ mem[k]=v; }
}
function freshDB(){ return { pointer:{w:1,d:0}, logs:{}, settings:{units:'lb', timer:true} }; }
async function loadDB(){
  const raw = await rawGet(KEY);
  if(raw){ try{ DB = JSON.parse(raw); }catch(e){ DB=freshDB(); } }
  else DB = freshDB();
  if(!DB.settings) DB.settings={units:'lb',timer:true};
  if(DB.settings.units==null) DB.settings.units='lb';
  if(DB.settings.timer==null) DB.settings.timer=true;
}
let saveTimer=null;
function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>rawSet(KEY, JSON.stringify(DB)), 120); }

/* ---------- helpers ---------- */
const TOTAL_DAYS = 12*4;
const sk = (w,d)=>`w${w}d${d}`;
function dayObj(w,d){ const wk=PROGRAM.weeks[w-1]; return wk?wk.days[d]:null; }
function dayTitle(w,d){ const o=dayObj(w,d); if(!o) return ''; return `${o.type} · Day ${d+1}`; }
function resolvedName(w,d,i){ const log=DB.logs[sk(w,d)]; const sw=log&&log.ex&&log.ex[i]?log.ex[i].swap:null; return sw||dayObj(w,d).exercises[i].name; }
function ensureLog(w,d){
  const key=sk(w,d);
  if(!DB.logs[key]){
    const o=dayObj(w,d);
    DB.logs[key]={ w,d,type:o.type, startedAt:Date.now(), completedAt:null, date:null, ex:{} };
  }
  return DB.logs[key];
}
function exState(w,d,i){
  const log=ensureLog(w,d);
  if(!log.ex[i]) log.ex[i]={ swap:null, sets:[] };
  const want=dayObj(w,d).exercises[i].sets;
  while(log.ex[i].sets.length<want) log.ex[i].sets.push({wt:'',reps:'',done:false});
  if(log.ex[i].sets.length>want) log.ex[i].sets.length=want;
  return log.ex[i];
}
function exDone(w,d,i){ const log=DB.logs[sk(w,d)]; if(!log||!log.ex[i]) return false; const want=dayObj(w,d).exercises[i].sets; const s=log.ex[i].sets; return s.length>=want && s.slice(0,want).every(x=>x.done); }
function sessionDoneCount(w,d){ const o=dayObj(w,d); let n=0; for(let i=0;i<o.exercises.length;i++) if(exDone(w,d,i)) n++; return n; }
function totalSets(o){ return o.exercises.reduce((a,e)=>a+e.sets,0); }
function parseRest(r){ if(!r) return 0; if(/0\s*min/.test(r)) return 0; const m=r.match(/([\d.]+)\s*min/); return m?Math.round(parseFloat(m[1])*60):0; }
function lastTimeFor(name, exceptKey){
  const done = Object.values(DB.logs).filter(l=>l.completedAt && sk(l.w,l.d)!==exceptKey).sort((a,b)=>b.completedAt-a.completedAt);
  for(const l of done){
    const o=dayObj(l.w,l.d); if(!o) continue;
    for(let i=0;i<o.exercises.length;i++){
      const rn=(l.ex[i]&&l.ex[i].swap)||o.exercises[i].name;
      if(rn===name && l.ex[i]){
        const s=l.ex[i].sets.filter(x=>x.done&&x.wt!=='');
        if(s.length) return s.map(x=>`${x.wt}×${x.reps}`).join(' · ');
      }
    }
  }
  return null;
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(ts){ const d=new Date(ts); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

/* ---------- status bar ---------- */
function statusbar(){
  const t=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  return `<div class="statusbar"><span class="mono">${t}</span><span class="ic">${ic('antenna-bars-5')} ${ic('wifi')} ${ic('battery-3')}</span></div>`;
}

/* ---------- TODAY ---------- */
function isComplete(){ const p=DB.pointer; return p.w>12; }
function weekStrip(){
  const today=new Date(); today.setHours(0,0,0,0);
  const byDate={};
  Object.values(DB.logs).forEach(l=>{ if(l.completedAt){ const d=new Date(l.completedAt); d.setHours(0,0,0,0); byDate[+d]=l.type[0]; } });
  let cells='';
  for(let off=6;off>=0;off--){
    const d=new Date(today); d.setDate(d.getDate()-off);
    const isToday=off===0;
    const mark=byDate[+d];
    const wd=d.toLocaleDateString(undefined,{weekday:'short'})[0];
    let cls='cell', inner='·';
    if(mark){ cls+=' done'; inner=mark; }
    if(isToday){ cls+=' today'; if(!mark) inner=isComplete()?ic('flag'):(dayObj(DB.pointer.w,DB.pointer.d).type[0]); }
    cells+=`<div class="d"><div class="lbl ${isToday?'today':''}">${wd}</div><div class="${cls}">${inner}</div></div>`;
  }
  return `<div class="strip">${cells}</div>`;
}
function screenToday(){
  const p=DB.pointer;

  if(isComplete()){
    hero=`<div class="card fadein" style="padding:22px;text-align:center;">

      <button class="btn-primary" style="margin-top:16px;" data-act="start">${ic('player-play')} ${started?'Resume session':'Start session'}</button>
    </div>`;
  }
  const progWeek = isComplete()?12:p.w;
  const progPct = Math.round((Object.values(DB.logs).filter(l=>l.completedAt).length)/TOTAL_DAYS*100);
  return `${statusbar()}
    <div class="pad" style="display:flex;justify-content:space-between;align-items:center;padding-top:6px;">
      <div class="anton" style="font-size:20px;color:var(--orange);">Essentials 4x</div>

function recentList(){
  const done=Object.values(DB.logs).filter(l=>l.completedAt).sort((a,b)=>b.completedAt-a.completedAt).slice(0,3);
  if(!done.length) return '';
  let rows=done.map(l=>{
    const o=dayObj(l.w,l.d); const sets=sessionDoneCount(l.w,l.d);
    return `<div class="ex-row" style="margin-top:8px;" data-act="view" data-w="${l.w}" data-d="${l.d}">

      <span class="dim" style="display:inline-flex;align-items:center;">${ic('chevron-right')}</span></div>`;
  }).join('');
  return `<div class="pad" style="margin-top:22px;"><div class="eyebrow" style="margin-bottom:4px;">Recent</div>${rows}</div>`;
}

/* ---------- OVERVIEW ---------- */
function screenOverview(){
  const {w,d}=UI.view; const o=dayObj(w,d);
  const completed = DB.logs[sk(w,d)] && DB.logs[sk(w,d)].completedAt;
  const started = DB.logs[sk(w,d)] && sessionDoneCount(w,d)>0;
  const isCurrent = (DB.pointer.w===w && DB.pointer.d===d);
  // build grouped list
  let html=''; const ex=o.exercises; let i=0;
  while(i<ex.length){
    const e=ex[i];
    if(e.ss){ // gather superset group
      const g=e.ss; let rows='';
      while(i<ex.length && ex[i].ss===g){ const x=ex[i]; rows+=`<div class="grp-row"><span class="ex-name">${x.ss}${x.ssPos} · ${esc(x.name)}</span><span class="ex-target">${x.sets} × ${esc(x.target)}</span></div>`; i++; }

    } else {
      const base=e.name.replace(/\s*\(.*\)\s*/,'').trim();
      const next=ex[i+1];
      if(next && !next.ss && next.name.replace(/\s*\(.*\)\s*/,'').trim()===base && /\(/.test(e.name)){
        let rows=''; let label=base.toUpperCase();
        while(i<ex.length && ex[i].name.replace(/\s*\(.*\)\s*/,'').trim()===base && /\(/.test(ex[i].name)){
          const x=ex[i]; const tag=(x.name.match(/\(([^)]+)\)/)||[])[1]||x.name;
          rows+=`<div class="grp-row"><span class="ex-name">${esc(tag)}</span><span class="ex-target">${x.sets} × ${esc(x.target)}</span></div>`; i++;
        }
        html+=`<div class="grp" style="margin-top:9px;"><div class="grp-head dim">${esc(label)}</div>${rows}</div>`;
      } else {
        html+=`<div class="ex-row" style="margin-top:9px;"><span class="ex-name">${esc(e.name)}</span><span class="ex-target">${e.sets} × ${esc(e.target)}</span></div>`; i++;
      }
    }
  }
  const cta = completed
    ? `<button class="btn-ghost" data-act="start">${ic('eye')} Review / edit logged sets</button>`
    : isCurrent
      ? `<button class="btn-primary" data-act="start">${ic('player-play')} ${started?'Resume session':'Start session'}</button>`
      : `<div class="note" style="text-align:center;">This isn't your current session. Finish the queued one first — jumping around comes in the next build.</div>`;
  return `${statusbar()}
    <div class="pad" style="display:flex;align-items:center;gap:12px;padding-top:6px;">
      <button data-act="back" style="font-size:22px;color:var(--t2);">${ic('chevron-left')}</button>
      <div><div class="eyebrow" style="color:var(--orange);">Week ${w} · session ${d+1}</div>
      <div class="anton" style="font-size:24px;margin-top:2px;">${o.type} · Day ${d+1}</div></div>
    </div>
    <div class="pad" style="margin-top:6px;"><div class="mono dim" style="font-size:12px;">${o.exercises.length} EXERCISES · ${totalSets(o)} SETS${completed?' · DONE':''}</div></div>
    <div class="pad" style="margin-top:14px;">${html}</div>
    <div class="pad" style="margin-top:20px;">${cta}</div>`;
}

/* ---------- LOGGING ---------- */
function screenLog(){
  const {w,d}=UI.view; const o=dayObj(w,d);
  const i=UI.ai; const e=o.exercises[i];
  const st=exState(w,d,i);
  const name=resolvedName(w,d,i);
  const last=lastTimeFor(name, sk(w,d));
  const units=DB.settings.units;

  // chips
  let chips='';
  for(let k=0;k<o.exercises.length;k++){
    let cls='chip'; if(k===i) cls+=' cur'; else if(exDone(w,d,k)) cls+=' done';
    chips+=`<button class="${cls}" data-act="goto" data-i="${k}">${exDone(w,d,k)&&k!==i?ic('check'):(k+1)}</button>`;
  }

  // set rows
  let rows='';
  for(let s=0;s<e.sets;s++){
    const v=st.sets[s];
    const cls='setrow'+(v.done?' done':(allPrevDone(st,s)?' active':''));
    rows+=`<div class="${cls}" data-set="${s}">
      <button class="check" data-act="toggleset" data-i="${i}" data-s="${s}" aria-label="Mark set ${s+1} done">${ic('check')}</button>
      <span class="slabel">S${s+1}</span>
      <div style="flex:1"></div>
      <input class="sinput" data-fld="wt" data-i="${i}" data-s="${s}" inputmode="decimal" placeholder="${units==='lb'?'lb':'kg'}" value="${v.wt!==''?v.wt:''}">
      <span class="sx">×</span>
      <input class="sinput" data-fld="reps" data-i="${i}" data-s="${s}" inputmode="numeric" placeholder="reps" value="${v.reps!==''?v.reps:''}">
    </div>`;
  }

  // swap panel
  const opts=[{n:dayObj(w,d).exercises[i].name,tag:'prescribed'}];
  if(e.sub1) opts.push({n:e.sub1}); if(e.sub2) opts.push({n:e.sub2});
  let swapInner='';
  if(UI.swapOpen){
    swapInner = opts.map(op=>`<button class="swap-opt ${name===op.n?'sel':''}" data-act="swap" data-i="${i}" data-name="${esc(op.n)}">
        ${name===op.n?ic('check'):ic('circle')} ${esc(op.n)}${op.tag?` <span class="dim" style="font-size:11px;margin-left:auto;">${op.tag}</span>`:''}</button>`).join('')
      + (UI.otherOpen
          ? `<div class="setrow" style="margin-top:6px;background:var(--surface2);">
               <input id="otherInput" class="sinput" style="flex:1;width:auto;text-align:left;font-family:var(--grotesk);" placeholder="Type any exercise…">
               <button class="check" style="background:var(--orange);border-color:var(--orange);color:var(--orange-ink);" data-act="swapother" data-i="${i}">${ic('check')}</button>
             </div>`
          : `<button class="swap-opt" data-act="otheropen">${ic('plus')} Other…</button>`);
  }

  const rest=parseRest(e.rest);
  const warmLabel = (e.warmup==null||e.warmup===0)?null:(typeof e.warmup==='number'?(e.warmup===1?'1 SET':e.warmup+' SETS'):(String(e.warmup)+' SETS'));
  const warm = warmLabel ? `<span class="pill warm">${ic('flame')} WARM-UP / ${warmLabel}</span>` : '';
  const allDone = o.exercises.every((_,k)=>exDone(w,d,k));
  const finishCls = allDone?'btn-primary volt':'btn-primary';

  return `${statusbar()}
    <div class="pad" style="display:flex;align-items:center;gap:10px;padding-top:6px;">
      <button data-act="back" style="font-size:22px;color:var(--t2);">${ic('chevron-left')}</button>
      <div class="anton" style="font-size:19px;flex:1;">${o.type} · Day ${d+1}</div>
      <span id="sessTimer" class="mono" style="color:var(--orange);font-size:13px;">${ic('clock')} 0:00</span>
    </div>
    <div class="chips" style="margin-top:10px;">${chips}</div>
    <div class="pad" style="margin-top:6px;">
      <div class="card fadein" style="padding:15px;" key="${i}">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="eyebrow">Exercise ${i+1} / ${o.exercises.length}${e.ss?` · superset ${e.ss}`:''}</span>
          <span class="mono muted" style="font-size:11px;">REST ${e.rest?esc(e.rest.replace('~','~ ').toUpperCase()):'—'}</span>
        </div>
        <div class="anton" style="font-size:26px;margin-top:8px;">${esc(name)}</div>
        <div style="display:flex;gap:12px;align-items:center;margin-top:9px;flex-wrap:wrap;">
          <span class="mono" style="color:var(--orange);font-size:13px;font-weight:700;">${esc(e.target).toUpperCase()}${e.dropset?' +DROP':''}</span>
          ${e.rpe?`<span class="mono muted" style="font-size:12px;">RPE ${esc(e.rpe)}</span>`:''}
          <span class="mono muted" style="font-size:12px;">${e.sets} SET${e.sets>1?'S':''}</span>
        </div>
        ${warm?`<div style="margin-top:11px;background:var(--surface2);border-radius:var(--r);padding:8px 11px;">${warm}</div>`:''}
        ${last?`<div class="mono" style="color:var(--t3);font-size:11px;margin-top:11px;">${ic('history')} LAST: ${esc(last)}</div>`:`<div class="mono" style="color:var(--t4);font-size:11px;margin-top:11px;">${ic('history')} First time logging this</div>`}
        <div class="eyebrow" style="margin:14px 0 2px;">Working sets</div>
        ${rows}
        ${e.dropset?`<div class="dim" style="font-size:11px;margin-top:8px;line-height:1.4;">${ic('arrow-down')} Last set: drop ~50% and rep out again.</div>`:''}
        <div id="restMount"></div>
        <div style="display:flex;gap:9px;margin-top:14px;">
          ${i>0?`<button class="btn-ghost" style="flex:0 0 46px;" data-act="goto" data-i="${i-1}">${ic('chevron-left')}</button>`:''}
          ${i<o.exercises.length-1
            ? `<button class="btn-primary" style="flex:1;" data-act="goto" data-i="${i+1}">Next exercise ${ic('chevron-right')}</button>`
            : `<button class="${finishCls}" style="flex:1;" data-act="finish">${ic('flag-check')} Finish session</button>`}
        </div>
        <button class="dropdown-toggle" data-act="swaptoggle"><span><span style="color:var(--orange);display:flex;">${ic('arrows-shuffle')}</span> Swap exercise for this session</span><span class="dim" style="display:flex;">${UI.swapOpen?ic('chevron-up'):ic('chevron-down')}</span></button>
        ${UI.swapOpen?`<div style="margin-top:4px;">${swapInner}</div>`:''}
        ${e.notes?`<div class="note" style="margin-top:12px;"><span class="eyebrow" style="color:var(--orange);display:flex;align-items:center;gap:6px;margin-bottom:6px;">${ic('info-circle')} Coaching note</span>${esc(e.notes)}</div>`:''}
      </div>
    </div>
    <div class="pad" style="margin-top:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span class="eyebrow">Session progress</span>
        <span class="mono" style="color:var(--volt);font-size:11px;">${sessionDoneCount(w,d)} / ${o.exercises.length}</span>
      </div>
      <div class="meter"><i style="width:${Math.round(sessionDoneCount(w,d)/o.exercises.length*100)}%"></i></div>
    </div>`;
}
function allPrevDone(st,s){ for(let k=0;k<s;k++) if(!st.sets[k].done) return false; return true; }

/* ---------- PROGRAM (browse) ---------- */
function screenProgram(){
  let html='';
  PROGRAM.weeks.forEach(wk=>{
    const isCur=wk.week===DB.pointer.w;
    let days=wk.days.map((d,di)=>{
      const done=DB.logs[sk(wk.week,di)]&&DB.logs[sk(wk.week,di)].completedAt;
      const cur=DB.pointer.w===wk.week&&DB.pointer.d===di&&!isComplete();
      return `<button class="ex-row" style="margin-top:7px;width:100%;text-align:left;" data-act="view" data-w="${wk.week}" data-d="${di}">
        <span class="ex-name">${d.type} · Day ${di+1}
          ${done?('<span style="color:var(--volt);margin-left:6px;display:inline-flex;align-items:center;">'+ic('circle-check')+'</span>'):cur?'<span class="mono" style="color:var(--orange);font-size:10px;margin-left:6px;">NOW</span>':''}</span>
        <span class="ex-target">${d.exercises.length} ex</span></button>`;
    }).join('');
    html+=`<div style="margin-top:18px;"><div class="eyebrow" style="color:${isCur?'var(--orange)':'var(--t3)'};">Week ${wk.week}${isCur?' · current':''}</div>${days}</div>`;
  });
  return `${statusbar()}
    <div class="pad" style="padding-top:6px;"><div class="anton" style="font-size:24px;">Program</div>
    <div class="mono dim" style="font-size:12px;margin-top:4px;">12 WEEKS · 3 BLOCKS · 4 DAYS / WEEK</div></div>
    <div class="pad">${html}</div>`;
}

/* ---------- PROGRESS (placeholder) ---------- */
function screenProgress(){
  const logged=Object.values(DB.logs).filter(l=>l.completedAt).length;
  return `${statusbar()}
    <div class="pad" style="padding-top:6px;"><div class="anton" style="font-size:24px;">Progress</div></div>
    <div class="empty">${ic('chart-line')}
      <div class="anton" style="font-size:18px;color:var(--t2);">Charts unlock with data</div>
      <div style="font-size:13px;margin-top:8px;line-height:1.5;max-width:280px;margin-left:auto;margin-right:auto;">
        You've logged ${logged} session${logged===1?'':'s'}. Once a few more are in, this is where your est. 1RM trends and weekly volume per muscle group will live — the lean-out dashboard. Coming in the next build.</div>
    </div>`;
}

/* ---------- SETTINGS ---------- */
function screenSettings(){
  const s=DB.settings;
  return `${statusbar()}
    <div class="pad" style="padding-top:6px;"><div class="anton" style="font-size:24px;">Settings</div></div>
    <div class="pad" style="margin-top:14px;">
      <div class="ex-row" data-act="units"><span class="ex-name">Weight units</span><span class="mono" style="color:var(--orange);">${s.units.toUpperCase()}</span></div>
      <div class="ex-row" style="margin-top:9px;" data-act="toggletimer"><span class="ex-name">Auto rest timer</span><span class="mono" style="color:${s.timer?'var(--volt)':'var(--t3)'};">${s.timer?'ON':'OFF'}</span></div>
      <div class="ex-row" style="margin-top:9px;" data-act="export"><span class="ex-name">Export my data</span><span class="dim" style="display:inline-flex;align-items:center;">${ic('copy')}</span></div>
      <div class="ex-row" style="margin-top:9px;" data-act="importopen"><span class="ex-name">Restore from backup</span><span class="dim" style="display:inline-flex;align-items:center;">${ic('history')}</span></div>
      <div class="ex-row" style="margin-top:9px;border-color:var(--orange-bd);" data-act="reset"><span class="ex-name" style="color:var(--orange);">Reset all data</span><span style="color:var(--orange);;display:inline-flex;align-items:center;">${ic('trash')}</span></div>
      <div class="note" style="margin-top:16px;">Your data is saved on this device. Export a backup now and then so you can restore it if you switch phones or clear your browser.</div>
      <div class="dim" style="font-size:11px;margin-top:14px;line-height:1.5;text-align:center;">Build 1 · core logging loop.<br>Program nav (edit past sessions) and Progress charts coming next.</div>
    </div>`;
}

/* ---------- render + nav ---------- */
function tabbar(){
  const t=(id,icon,lbl)=>`<button class="tab ${UI.screen===id?'on':''}" data-act="tab" data-tab="${id}">${ic(icon)}${lbl}</button>`;
  return `<div class="tabbar">${t('today','home','Today')}${t('program','list-check','Program')}${t('progress','chart-line','Progress')}${t('settings','settings','Settings')}</div>`;
}
function importModal(){
  return `<div class="overlay"><div class="modal">
    <div class="anton" style="font-size:18px;">Restore from backup</div>
    <div class="dim" style="font-size:12px;margin-top:6px;line-height:1.5;">Paste a backup you exported earlier. This replaces everything currently saved.</div>
    <textarea id="importText" placeholder="Paste your backup here…"></textarea>
    <div style="display:flex;gap:9px;margin-top:12px;">
      <button class="btn-ghost" data-act="importcancel">Cancel</button>
      <button class="btn-primary" style="font-size:14px;padding:13px;" data-act="importsave">Restore</button>
    </div></div></div>`;
}
function render(){
  const app=document.getElementById('app');
  let body='';
  switch(UI.screen){
    case 'today': body=screenToday(); break;
    case 'overview': body=screenOverview(); break;
    case 'log': body=screenLog(); break;
    case 'program': body=screenProgram(); break;
    case 'progress': body=screenProgress(); break;
    case 'settings': body=screenSettings(); break;
  }
  const showTabs = ['today','program','progress','settings'].includes(UI.screen);
  app.innerHTML = body + (showTabs?tabbar():'') + (UI.importOpen?importModal():'');
  app.style.paddingBottom = showTabs?'78px':'24px';
  if(UI.screen==='log'){ mountRest(); startSessionTimer(); } else stopSessionTimer();
}

/* ---------- session timer ---------- */
let sessTimerInt=null;
function startSessionTimer(){
  stopSessionTimer();
  const {w,d}=UI.view; const log=DB.logs[sk(w,d)];
  if(!log) return;
  const tick=()=>{ const el=document.getElementById('sessTimer'); if(!el) return;
    const sec=Math.floor((Date.now()-log.startedAt)/1000); const m=Math.floor(sec/60), s=sec%60;
    el.innerHTML=`${ic('clock')} ${m}:${String(s).padStart(2,'0')}`; };
  tick(); sessTimerInt=setInterval(tick,1000);
}
function stopSessionTimer(){ if(sessTimerInt){clearInterval(sessTimerInt); sessTimerInt=null;} }

/* ---------- rest timer ---------- */
function mountRest(){
  const m=document.getElementById('restMount'); if(!m) return;
  if(!restState){ m.innerHTML=''; return; }
  const C=2*Math.PI*18;
  m.innerHTML=`<div class="restbar"><svg class="ring" viewBox="0 0 44 44"><circle class="bg" cx="22" cy="22" r="18"></circle>
    <circle class="fg" id="restFg" cx="22" cy="22" r="18" stroke-dasharray="${C}" stroke-dashoffset="0"></circle></svg>
    <div><div class="eyebrow" style="color:var(--orange);">Resting</div><div class="anton" id="restNum" style="font-size:20px;margin-top:2px;">0:00</div></div>
    <div style="flex:1"></div>
    <button class="swap-opt" style="margin:0;background:transparent;border-color:var(--orange-bd);" data-act="restskip">Skip ${ic('player-skip-forward')}</button></div>`;
  paintRest();
}
function paintRest(){
  if(!restState) return;
  const num=document.getElementById('restNum'), fg=document.getElementById('restFg');
  const left=Math.max(0,Math.round((restState.end-Date.now())/1000));
  if(num) num.textContent=`${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}`;
  if(fg){ const C=2*Math.PI*18; fg.style.strokeDashoffset = C*(1-left/restState.total); }
  if(left<=0) stopRest(true);
}
function startRest(sec){
  if(!DB.settings.timer || sec<=0) return;
  restState={end:Date.now()+sec*1000, total:sec};
  mountRest(); clearInterval(restInterval); restInterval=setInterval(paintRest,250);
}
function stopRest(buzz){
  clearInterval(restInterval); restInterval=null; restState=null;
  if(buzz && navigator.vibrate) try{navigator.vibrate(180);}catch(e){}
  const m=document.getElementById('restMount'); if(m) m.innerHTML='';
}

/* ---------- toast ---------- */
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2200);
}

/* ---------- read inputs ---------- */
function syncInputs(){
  if(UI.screen!=='log') return;
  const {w,d}=UI.view; const st=DB.logs[sk(w,d)]?DB.logs[sk(w,d)].ex[UI.ai]:null; if(!st) return;
  document.querySelectorAll('#app .sinput[data-fld]').forEach(inp=>{
    const s=+inp.dataset.s, fld=inp.dataset.fld;
    if(st.sets[s]) st.sets[s][fld==='wt'?'wt':'reps']=inp.value.trim();
  });
}

/* ---------- events ---------- */
document.addEventListener('input', e=>{
  if(e.target.classList.contains('sinput') && e.target.dataset.fld){
    const {w,d}=UI.view; const ex=exState(w,d,UI.ai); const s=+e.target.dataset.s;
    ex.sets[s][e.target.dataset.fld==='wt'?'wt':'reps']=e.target.value.trim(); save();
  }
});
document.addEventListener('click', e=>{
  const el=e.target.closest('[data-act]'); if(!el) return;
  const act=el.dataset.act;
  const W=UI.view?UI.view.w:DB.pointer.w, D=UI.view?UI.view.d:DB.pointer.d;

  if(act==='tab'){ UI.screen=el.dataset.tab; UI.view=null; resetEx(); render(); return; }
  if(act==='start'){
    if(UI.screen==='today'){ UI.view={w:DB.pointer.w,d:DB.pointer.d}; UI.screen='overview'; render(); window.scrollTo(0,0); return; }
    if(!UI.view) UI.view={w:DB.pointer.w,d:DB.pointer.d};
    ensureLog(UI.view.w,UI.view.d); UI.screen='log'; UI.ai=0; resetEx(); render(); window.scrollTo(0,0); return; }
  if(act==='view'){ UI.view={w:+el.dataset.w,d:+el.dataset.d}; UI.screen='overview'; render(); return; }
  if(act==='back'){ UI.screen=(UI.screen==='log')?'overview':'today'; render(); window.scrollTo(0,0); return; }

  if(act==='goto'){ syncInputs(); save(); UI.ai=+el.dataset.i; resetEx(); stopRest(); render(); window.scrollTo(0,0); return; }
  if(act==='toggleset'){
    const i=+el.dataset.i, s=+el.dataset.s; const ex=exState(W,D,i);
    // pull current input values first
    syncInputs();
    const set=ex.sets[s];
    set.done=!set.done;
    if(set.done){ if(set.wt==='') set.wt='0'; if(set.reps==='') set.reps='0'; const rest=parseRest(dayObj(W,D).exercises[i].rest); save(); render(); startRest(rest); return; }
    save(); render(); return;
  }
  if(act==='swaptoggle'){ syncInputs(); UI.swapOpen=!UI.swapOpen; UI.otherOpen=false; render(); return; }
  if(act==='swap'){ const ex=exState(W,D,+el.dataset.i); const nm=el.dataset.name; ex.swap=(nm===dayObj(W,D).exercises[+el.dataset.i].name)?null:nm; UI.swapOpen=false; save(); render(); return; }
  if(act==='otheropen'){ UI.otherOpen=true; render(); setTimeout(()=>{const x=document.getElementById('otherInput'); if(x)x.focus();},30); return; }
  if(act==='swapother'){ const x=document.getElementById('otherInput'); const v=x?x.value.trim():''; if(v){ exState(W,D,+el.dataset.i).swap=v; UI.swapOpen=false; UI.otherOpen=false; save(); render(); } return; }
  if(act==='notetoggle'){ syncInputs(); UI.noteOpen=!UI.noteOpen; render(); return; }
  if(act==='restskip'){ stopRest(false); return; }

  if(act==='finish'){ finishSession(); return; }
  if(act==='restart'){ if(confirm('Start a fresh 12-week cycle? Your logged history stays saved, but the program resets to Week 1.')){ DB.pointer={w:1,d:0}; save(); UI.screen='today'; render(); } return; }

  if(act==='units'){ DB.settings.units = DB.settings.units==='lb'?'kg':'lb'; save(); render(); return; }
  if(act==='toggletimer'){ DB.settings.timer=!DB.settings.timer; save(); render(); return; }
  if(act==='importopen'){ UI.importOpen=true; render(); return; }
  if(act==='importcancel'){ UI.importOpen=false; render(); return; }
  if(act==='importsave'){ const t=document.getElementById('importText'); try{ const p=JSON.parse(t.value); if(!p||typeof p!=='object'||!p.logs||!p.pointer) throw 0; DB=p; if(!DB.settings)DB.settings={units:'lb',timer:true}; UI.importOpen=false; save(); UI.screen='today'; render(); toast('Backup restored'); }catch(e){ toast('That doesn\'t look like a valid backup'); } return; }
  if(act==='export'){ const data=JSON.stringify(DB,null,2);
    if(navigator.clipboard){ navigator.clipboard.writeText(data).then(()=>toast('Copied your data to clipboard')).catch(()=>fallbackExport(data)); }
    else fallbackExport(data); return; }
  if(act==='reset'){ if(confirm('Erase ALL logged sets and progress? This cannot be undone.')){ DB=freshDB(); save(); UI.screen='today'; render(); toast('Data reset'); } return; }
});
function fallbackExport(data){ const w=window.open('','_blank'); if(w){ w.document.write('<pre>'+data.replace(/</g,'&lt;')+'</pre>'); } else toast('Could not open export'); }
function resetEx(){ UI.swapOpen=false; UI.otherOpen=false; UI.noteOpen=false; }

function finishSession(){
  syncInputs();
  const {w,d}=UI.view; const o=dayObj(w,d);
  const done=sessionDoneCount(w,d);
  if(done<o.exercises.length){
    if(!confirm(`You've logged ${done} of ${o.exercises.length} exercises. Finish anyway?`)) return;
  }
  const log=ensureLog(w,d);
  const firstFinish=!log.completedAt;
  log.completedAt=Date.now(); log.date=new Date().toISOString().slice(0,10);
  // advance pointer only if finishing the current queued session and moving forward
  if(firstFinish && DB.pointer.w===w && DB.pointer.d===d){
    let nd=d+1, nw=w; if(nd>3){ nd=0; nw=w+1; }
    DB.pointer={w:nw,d:nd};
  }
  save(); stopRest(); UI.screen='today'; UI.view=null; resetEx(); render();
  toast(firstFinish?'Session logged 💪 next one queued':'Session updated');
}

/* ---------- boot ---------- */
(async function(){
  await loadDB();
  render();
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden && UI.screen==='log') paintRest(); });
})();
</script>
